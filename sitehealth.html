<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Health — QD Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg:      #FAF6F1;
        --card:    #fff;
        --gold:    #C9A84C;
        --purple:  #7B3F5E;
        --text:    #3B2417;
        --text2:   #5C4033;
        --text3:   #9B7B6E;
        --border:  #E8D5C4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* AUTH GATE */
    #auth-gate {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px;
    }
    #auth-box {
        background: var(--card); border-radius: 20px; padding: 40px 36px;
        box-shadow: 0 8px 32px rgba(59,36,23,0.12); width: 100%; max-width: 400px;
        text-align: center;
    }
    #auth-box h2 { font-family: 'Nunito', sans-serif; font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }
    #auth-box p  { font-size: 0.85rem; color: var(--text3); margin-bottom: 24px; }
    .auth-input {
        width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
        border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.9rem;
        color: var(--text); background: var(--bg); margin-bottom: 12px;
        outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--purple); }
    .auth-btn {
        width: 100%; padding: 11px; background: var(--purple); color: #fff;
        border: none; border-radius: 10px; font-family: 'Poppins', sans-serif;
        font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.88; }
    #auth-error { color: #C0392B; font-size: 0.82rem; margin-top: 10px; display: none; }

    /* MAIN PAGE */
    #health-page { display: none; }

    header {
        background: var(--card); border-bottom: 1.5px solid var(--border);
        padding: 16px 32px; display: flex; align-items: center;
        justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.2rem; color: var(--text); }
    .header-logo span { color: var(--gold); }
    .header-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--text2); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-back {
        padding: 7px 16px; background: transparent; border: 1.5px solid var(--border);
        border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.82rem;
        font-weight: 600; color: var(--text2); cursor: pointer; text-decoration: none;
        transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: var(--purple); color: var(--purple); }
    .btn-refresh {
        padding: 7px 16px; background: var(--purple); border: none;
        border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.82rem;
        font-weight: 600; color: #fff; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-refresh:hover { opacity: 0.88; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .section { margin-bottom: 32px; }
    .section-title {
        font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 900;
        color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em;
        margin-bottom: 14px;
    }

    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
    .grid-cards-wide { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }

    .sh-card {
        border-radius: 14px; padding: 16px 18px;
        display: flex; flex-direction: column; gap: 5px;
    }
    .sh-card-icon  { font-size: 1.4rem; }
    .sh-card-value { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.15rem; }
    .sh-card-label { font-size: 0.74rem; font-weight: 600; color: var(--text3); }

    .alert-item {
        border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
        font-size: 0.85rem; border-left: 4px solid;
    }

    .suggestion-item {
        background: var(--card); border-radius: 12px; padding: 16px 20px;
        margin-bottom: 10px; box-shadow: 0 2px 8px rgba(59,36,23,0.06);
        border-left: 4px solid #E8872A;
    }
    .suggestion-item h4 {
        font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.92rem;
        color: var(--text); margin-bottom: 4px;
    }
    .suggestion-item p { font-size: 0.82rem; color: var(--text3); }

    .all-good {
        font-size: 0.88rem; padding: 12px 16px; background: #EAFAF1;
        border-radius: 10px; border-left: 4px solid #1E8449; color: #1E8449;
    }

    #last-run { font-size: 0.78rem; color: var(--text3); text-align: right; margin-top: -8px; margin-bottom: 24px; }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate">
    <div id="auth-box">
        <div style="font-size:2.5rem;margin-bottom:12px">🛠️</div>
        <h2>Site Health</h2>
        <p>Sign in with your Full Access staff account to continue.</p>
        <input class="auth-input" type="text" id="sh-user" placeholder="Username" autocomplete="username">
        <input class="auth-input" type="password" id="sh-pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doShLogin()">
        <button class="auth-btn" onclick="doShLogin()">Sign In</button>
        <div id="auth-error"></div>
    </div>
</div>

<!-- HEALTH PAGE -->
<div id="health-page">
    <header>
        <div class="header-left">
            <div class="header-logo">QD <span>Admin</span></div>
            <div class="header-title">🛠️ Site Health</div>
        </div>
        <div class="header-right">
            <a href="admin.html" class="btn-back">← Back to Admin</a>
            <button class="btn-refresh" onclick="runSiteHealth()">↻ Refresh</button>
        </div>
    </header>

    <main>
        <div id="last-run"></div>

        <div class="section">
            <div class="section-title">API Endpoints</div>
            <div class="grid-cards-wide" id="health-apis"></div>
        </div>

        <div class="section">
            <div class="section-title">Data Overview</div>
            <div class="grid-cards" id="health-data"></div>
        </div>

        <div class="section">
            <div class="section-title">Alerts</div>
            <div id="health-alerts"></div>
        </div>

        <div class="section">
            <div class="section-title">Suggestions</div>
            <div id="health-suggestions"></div>
        </div>
    </main>
</div>

<script>
var shUser = null;

async function doShLogin() {
    var u = document.getElementById('sh-user').value.trim();
    var p = document.getElementById('sh-pass').value;
    var errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    if (!u || !p) { errEl.textContent = 'Please enter username and password.'; errEl.style.display = 'block'; return; }
    try {
        var r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p }),
        });
        var data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Invalid credentials.'; errEl.style.display = 'block'; return; }
        if (data.role !== 'builder') {
            errEl.textContent = 'Access denied — Full Access role required.';
            errEl.style.display = 'block';
            return;
        }
        shUser = data;
        sessionStorage.setItem('qd_sess', JSON.stringify(data));
        showHealthPage();
    } catch {
        errEl.textContent = 'Could not connect. Please try again.';
        errEl.style.display = 'block';
    }
}

function showHealthPage() {
    document.getElementById('auth-gate').style.display  = 'none';
    document.getElementById('health-page').style.display = 'block';
    runSiteHealth();
}

// ── CHECK EXISTING SESSION ──────────────────────────────────────────────────
(function() {
    try {
        var s = sessionStorage.getItem('qd_sess');
        if (s) {
            var stored = JSON.parse(s);
            if (stored && stored.role === 'builder') {
                shUser = stored;
                showHealthPage();
            }
        }
    } catch {}
})();

// ── HEALTH RUNNER ───────────────────────────────────────────────────────────
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shCard(icon, label, value, bg, color) {
    return `<div class="sh-card" style="background:${bg}">
        <div class="sh-card-icon">${icon}</div>
        <div class="sh-card-value" style="color:${color}">${typeof value === 'number' ? value : esc(String(value))}</div>
        <div class="sh-card-label">${esc(label)}</div>
    </div>`;
}

function shAlert(type, msg) {
    const cfg = {
        error: { bg:'#FDEDEC', color:'#C0392B', border:'#C0392B', icon:'🔴' },
        warn:  { bg:'#FEF3E2', color:'#C4720A', border:'#E8872A', icon:'🟡' },
        info:  { bg:'#EBF5FB', color:'#2471A3', border:'#2471A3', icon:'🔵' },
    }[type] || { bg:'#F2F3F4', color:'#5C4033', border:'#BDC3C7', icon:'⚪' };
    return `<div class="alert-item" style="background:${cfg.bg};color:${cfg.color};border-color:${cfg.border}">${cfg.icon} ${esc(msg)}</div>`;
}

async function runSiteHealth() {
    const APIS = [
        { label: 'Contacts',  url: '/api/contacts'  },
        { label: 'Interests', url: '/api/interests' },
        { label: 'Orders',    url: '/api/orders'    },
        { label: 'Inventory', url: '/api/inventory' },
        { label: 'Members',   url: '/api/members'   },
        { label: 'Users',     url: '/api/users'     },
    ];

    document.getElementById('health-apis').innerHTML   = APIS.map(a => shCard('⏳', a.label, 'Checking…', '#EBF5FB', '#2471A3')).join('');
    document.getElementById('health-data').innerHTML   = '<p style="color:#9B7B6E;font-size:0.85rem">Loading…</p>';
    document.getElementById('health-alerts').innerHTML = '<p style="color:#9B7B6E;font-size:0.85rem">Loading…</p>';

    const results = await Promise.all(APIS.map(async a => {
        const t0 = Date.now();
        try {
            const r = await fetch(a.url);
            const ms = Date.now() - t0;
            const data = r.ok ? await r.json() : null;
            return { label: a.label, ok: r.ok, status: r.status, ms, data };
        } catch {
            return { label: a.label, ok: false, status: 0, ms: Date.now() - t0, data: null };
        }
    }));

    document.getElementById('health-apis').innerHTML = results.map(r => {
        const icon  = r.ok ? '✅' : '❌';
        const color = r.ok ? '#1E8449' : '#C0392B';
        const bg    = r.ok ? '#EAFAF1' : '#FDEDEC';
        const sub   = r.ok ? `${r.ms}ms` : `HTTP ${r.status || 'failed'}`;
        return shCard(icon, r.label, sub, bg, color);
    }).join('');

    const get = label => { const r = results.find(x => x.label === label); return r?.ok ? (r.data || []) : []; };
    const contacts  = get('Contacts');
    const interests = get('Interests');
    const orders    = get('Orders');
    const inventory = get('Inventory');
    const members   = get('Members');
    const users     = get('Users');

    const today = new Date(); today.setHours(0,0,0,0);
    const activeMembers = members.filter(m => m.active !== false && (!m.expiryDate || new Date(m.expiryDate) >= today));
    const unreadMsgs    = contacts.filter(m => m.status === 'received' || !m.status).length;
    const newInterests  = interests.filter(i => i.status === 'new' || !i.status).length;
    const openOrders    = orders.filter(o => o.status === 'processing' || o.status === 'pending').length;
    const lowStock      = inventory.filter(i => (i.qty || i.quantity || 0) < 3);
    const totalRevenue  = orders.filter(o => o.status === 'complete' || o.status === 'completed').reduce((s,o) => s + (parseFloat(o.total||o.amount||0)||0), 0);

    document.getElementById('health-data').innerHTML = [
        shCard('👥', 'Active Members',   activeMembers.length,                     '#F3E8F0', '#7B3F5E'),
        shCard('🛒', 'Open Orders',      openOrders,                               '#EBF5FB', '#2471A3'),
        shCard('✉️', 'Unread Messages',  unreadMsgs + newInterests,               '#FEF3E2', '#C4720A'),
        shCard('📦', 'Inventory Items',  inventory.length,                         '#EAFAF1', '#1E8449'),
        shCard('👤', 'Staff Accounts',   users.length,                             '#F2F3F4', '#5C4033'),
        shCard('⚠️', 'Low Stock (<3)',   lowStock.length,                          lowStock.length > 0 ? '#FDEDEC' : '#EAFAF1', lowStock.length > 0 ? '#C0392B' : '#1E8449'),
        shCard('💰', 'Total Revenue',    '£' + totalRevenue.toFixed(2),            '#F3E8F0', '#7B3F5E'),
        shCard('📋', 'Total Orders',     orders.length,                            '#EBF5FB', '#2471A3'),
    ].join('');

    // Alerts
    const alerts = [];
    const failedApis = results.filter(r => !r.ok);
    if (failedApis.length) alerts.push({ type: 'error', msg: `API failure: ${failedApis.map(r=>r.label).join(', ')} — check server logs.` });

    const slowApis = results.filter(r => r.ok && r.ms > 1500);
    if (slowApis.length) alerts.push({ type: 'warn', msg: `Slow API response: ${slowApis.map(r=>`${r.label} (${r.ms}ms)`).join(', ')}` });

    const expiringSoon = members.filter(m => {
        if (!m.expiryDate || m.active === false) return false;
        const days = Math.ceil((new Date(m.expiryDate) - today) / 86400000);
        return days >= 0 && days <= 7;
    });
    if (expiringSoon.length) alerts.push({ type: 'warn', msg: `${expiringSoon.length} member(s) expire within 7 days: ${expiringSoon.map(m=>m.name).join(', ')}` });

    const expiredActive = members.filter(m => m.active !== false && m.expiryDate && new Date(m.expiryDate) < today);
    if (expiredActive.length) alerts.push({ type: 'error', msg: `${expiredActive.length} expired account(s) still marked active: ${expiredActive.map(m=>m.name).join(', ')}` });

    const stuckOrders = orders.filter(o => {
        if (o.status !== 'processing' && o.status !== 'pending') return false;
        return o.date && (today - new Date(o.date)) > 7 * 86400000;
    });
    if (stuckOrders.length) alerts.push({ type: 'warn', msg: `${stuckOrders.length} order(s) have been processing for over 7 days.` });

    if (lowStock.length) alerts.push({ type: 'warn', msg: `Low stock: ${lowStock.map(i=>i.name||i.title||'item').join(', ')}` });
    if (unreadMsgs > 0)   alerts.push({ type: 'info', msg: `${unreadMsgs} unread contact message(s) waiting for a response.` });
    if (newInterests > 0) alerts.push({ type: 'info', msg: `${newInterests} new Qur'an class interest submission(s) waiting.` });

    document.getElementById('health-alerts').innerHTML = alerts.length
        ? alerts.map(a => shAlert(a.type, a.msg)).join('')
        : '<div class="all-good">✅ No alerts — everything looks good!</div>';

    // Suggestions
    const suggestions = [
        {
            title: 'Set Google emails for all staff',
            detail: 'Staff with a Google email can sign in to the members portal automatically without needing a separate login.',
            check: users.some(u => !u.googleEmail),
        },
        {
            title: 'Add expiry dates to non-lifetime members',
            detail: 'Some active members have no expiry date set and no Lifetime plan. Check if these are intentional.',
            check: members.some(m => m.active !== false && !m.expiryDate && m.plan !== 'Lifetime'),
        },
        {
            title: 'Clear out-of-stock inventory items',
            detail: 'Items at 0 stock can confuse customers. Mark them unavailable or remove them.',
            check: inventory.some(i => (i.qty || i.quantity || 0) === 0),
        },
        {
            title: 'Resolve old messages and interests',
            detail: 'Mark read/replied messages as resolved to keep the inbox clean and easy to monitor.',
            check: contacts.some(m => m.status === 'read' || m.status === 'replied') || interests.some(i => i.status === 'contacted'),
        },
        {
            title: 'Follow up on Qur\'an class interest submissions',
            detail: 'There are new interest forms that haven\'t been followed up yet.',
            check: newInterests > 0,
        },
        {
            title: 'Verify Stripe integration',
            detail: 'Make sure the Stripe secret key is configured in the admin panel so order payments sync correctly.',
            check: false, // can't check from here, included as static reminder
        },
    ];
    const active = suggestions.filter(s => s.check);
    document.getElementById('health-suggestions').innerHTML = active.length
        ? active.map(s => `<div class="suggestion-item"><h4>💡 ${esc(s.title)}</h4><p>${esc(s.detail)}</p></div>`).join('')
        : '<div class="all-good">✅ No suggestions at this time.</div>';

    document.getElementById('last-run').textContent = 'Last checked: ' + new Date().toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
</script>
</body>
</html>
